syntax = "proto3";

package dev.feddi.api.usage.v1;

import "google/protobuf/timestamp.proto";

option java_multiple_files = true;
option java_outer_classname = "UsageReportProto";
option java_package = "dev.feddi.api.usage.v1";

message UsageReportRequest {
  repeated UsageRecord records = 1;
}

message UsageRecord {
  string operation_name = 1;
  string operation_type = 2;
  string canonical_document = 3;
  repeated string field_coordinates = 4;
  int64 duration_nanos = 5;
  bool http_error = 6;
  bool graphql_error = 7;
  string client_name = 8;
  string client_version = 9;
  google.protobuf.Timestamp timestamp = 10;
  optional int32 multiplier = 11;
}

message UsageReportResponse {
  int32 accepted = 1;
  string error = 2;
}
